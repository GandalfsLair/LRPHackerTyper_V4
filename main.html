<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFrame Example</title>
    <style>
        body {
            display: flex; /* Use flexbox for layout */
            flex-wrap: wrap; /* Allow wrapping to new lines */
            justify-content: center; /* Center the iframes horizontally */
            align-items: center; /* Center the iframes vertically (if needed) */
            height: 100vh; /* Make body take up full viewport height */
            margin: 0; /* Remove default body margins */
        }

        .iframe-container {
            width: 45%; /* Adjust width as needed */
            height: 45%; /* Adjust height as needed */
            margin: 10px; /* Add some margin between iframes */
            /*border: 1px solid #ccc;  Add a border (optional) */
            font-family: monospace;
            color: #00FF00;
            background-color: black;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none; /* Remove default iframe border */
        }

        /* Media query for smaller screens (e.g., mobile) */
        @media (max-width: 700px) {
            .iframe-container {
                width: 90%; /* Make iframes take up more width on smaller screens */
                height: 45%; /* Adjust height as needed */
            }
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        AvWurx<iframe src="AVWorx/AVWurx.html" title="Frame 1"></iframe>
    </div>

    <div class="iframe-container">
        FireWalker<iframe src="FireWalker/FireWalker.html" title="Frame 4"></iframe>
    </div>

    <div class="iframe-container">
        Helsing<iframe src="Helsing/Helsing.html" title="Frame 2"></iframe>
    </div>

    <div class="iframe-container">
        Vampyre<iframe src="Vampyre/Vampyre.html" title="Frame 3"></iframe>
    </div>

</body>
</html>
